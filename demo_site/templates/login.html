<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SecureCorp Portal — Sign In</title>
<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg, #4f46e5, #7c3aed);
    font-family:'Segoe UI', sans-serif;
}
.card{
    background:white;
    border-radius:16px;
    padding:44px 40px;
    width:100%;
    max-width:360px;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.logo{
    text-align:center;
    font-size:26px;
    font-weight:700;
    color:#4f46e5;
    margin-bottom:6px;
}
.tagline{
    text-align:center;
    color:#6b7280;
    font-size:13px;
    margin-bottom:28px;
}
label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:#374151;
    margin-bottom:6px;
    margin-top:16px;
}
input{
    width:100%;
    padding:11px 13px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:14px;
    box-sizing:border-box;
}
input:focus{
    outline:none;
    border-color:#4f46e5;
    box-shadow:0 0 0 3px rgba(79,70,229,0.15);
}
button{
    width:100%;
    margin-top:26px;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
}
button:hover{ background:#4338ca; }
.note{
    text-align:center;
    margin-top:20px;
    font-size:11.5px;
    color:#9ca3af;
}
</style>
</head>
<body>

<div class="card">
    <div class="logo">🔐 SecureCorp</div>
    <div class="tagline">This is a demo site protected by ShieldNet</div>

    <form action="/protected/welcome" method="POST">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Sign In</button>
    </form>

    <p class="note">Demo only — any credentials will work.</p>
</div>

</body>
</html>
